[package]
name = "willow-sdk"
version = "0.1.0"
edition = "2021"
authors = ["Willow Team"]
description = "Rust SDK for Willow - decentralized data indexing protocol"
license = "MIT"
repository = "https://github.com/willow/willow-rust-sdk"
keywords = ["willow", "web3", "indexing", "did", "decentralized"]
categories = ["web-programming", "cryptography"]

[dependencies]
# HTTP client
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }

# WebSocket client for GraphQL subscriptions over graphql-transport-ws
tokio-tungstenite = { version = "0.21", features = ["rustls-tls-native-roots"] }
futures-util = "0.3"

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Cryptography for DID auth
ed25519-dalek = "2.1"
secp256k1 = { version = "0.29", features = ["recovery", "rand"] }
sha2 = "0.10"
sha3 = "0.10"
hex = "0.4"
bs58 = "0.5"
rand = "0.8"

# Encryption for private file subgroves
chacha20poly1305 = "0.10"
x25519-dalek = { version = "2.0", features = ["static_secrets"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
url = "2.5"
base64 = "0.22"

# Logging
log = "0.4"
tracing = { version = "0.1", optional = true }

# CLI dependencies
clap = { version = "4.4", features = ["derive"] }
dirs = { version = "5.0", optional = true }

# Shared types with the server (token units, transaction types, etc.)
willow-types = { path = "../../crates/types" }

# Thin GKR verifier crate.
#
# With just the `verifiable-rpc` feature enabled, this pulls in only the
# binding-only path — pure sha2/subtle, no Expander transitive deps.
# With `verifiable-rpc-full` the SDK also pulls the Expander verifier
# subset via `willow-gkr-verify/full`; those deps are pinned to the
# `willow-network/Expander` fork via the [patch] block at the bottom of
# this file (keep in sync with the workspace root Cargo.toml).
willow-gkr-verify = { path = "../../crates/gkr-verify", optional = true }

# Light client dependencies - uses grovedb verify feature for lightweight proof verification
# These are included by default for trustless verification
grovedb = { version = "3.1.0", default-features = false, features = ["verify"] }
grovedb-version = "3.1.0"

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.5"
pretty_assertions = "1.4"
tempfile = "3.8"
env_logger = "0.11"

[features]
default = []
cli = ["dirs"]
tracing = ["dep:tracing"]
# Disable light client verification for minimal dependency footprint
# Use this if you trust your node and want faster compile times
no-light-client = []
# Enable client-side verification for the verifiable-RPC flow
# (GET /verifiable-rpc/:subgrove/:key with a GKR proof attached).
# Pure binding-only — fast compile, pure sha2/subtle, mobile-friendly.
verifiable-rpc = ["dep:willow-gkr-verify"]
# Extend `verifiable-rpc` with full-soundness GKR verification. Pulls in
# the Expander verifier subset via willow-gkr-verify's `full` feature
# (multi-minute cold build, multi-megabyte binary cost). Opt in when
# clients need Phase 2+ permissionless trust over the Phase 1 hosted-
# service trust model. See docs/todo/proposal-gkr-verify-crate.md.
verifiable-rpc-full = ["verifiable-rpc", "willow-gkr-verify/full"]

[[bin]]
name = "willow-cli"
path = "src/bin/cli.rs"
required-features = ["cli"]

# Operation examples - individual consensus transactions
[[example]]
name = "register_did"
path = "examples/operations/register_did.rs"

[[example]]
name = "register_subgrove"
path = "examples/operations/register_subgrove.rs"

[[example]]
name = "store_data"
path = "examples/operations/store_data.rs"

[[example]]
name = "transfer"
path = "examples/operations/transfer.rs"

[[example]]
name = "fund_subgrove"
path = "examples/operations/fund_subgrove.rs"

# Query/read examples
[[example]]
name = "query_data"
path = "examples/operations/query_data.rs"

[[example]]
name = "check_balances"
path = "examples/operations/check_balances.rs"

[[example]]
name = "list_registrations"
path = "examples/operations/list_registrations.rs"

# Patch Expander deps to the willow-network fork so willow-gkr-verify's
# `full` feature resolves the same type universe the workspace does.
# Mirror this block with crates/Cargo.toml exactly — the fork rev must
# match. See docs/todo/proposal-gkr-verify-crate.md for why the fork
# exists (GPU CUDA kernels not yet upstream) and when we might retire
# it.
[patch."https://github.com/PolyhedraZK/Expander"]
gkr = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
gkr_engine = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
arith = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
transcript = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
poly_commit = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
config_macros = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
circuit = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
sumcheck = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
serdes = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
bin = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
mersenne31 = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
goldilocks = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
babybear = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
gf2 = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
gf2_128 = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
gkr_hashers = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
polynomials = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
utils = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
crosslayer_prototype = { git = "https://github.com/willow-network/Expander", rev = "884c6cc971374fb10ddbfad17ac824090aafe95a" }
